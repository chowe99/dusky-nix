# Matugen-generated Hyprland color variables.
# Sourced by hyprland/source/appearance.conf via `source = ...hyprland-colors.conf`.
# Upstream dusky ships hyprland-colors.lua (Lua syntax) which Hyprland can't `source`;
# this `.conf` variant is layered on top by mergedTemplates in home/theming/matugen.nix.
# Source: {{image}}

$image = {{image}}

<* for name, value in colors *>
${{name}} = rgba({{value.default.hex_stripped}}ff)
<* endfor *>
