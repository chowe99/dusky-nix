source = ~/.config/matugen/generated/hyprland-colors.conf

general {
    gaps_in = 6
    gaps_out = 12
    gaps_workspaces = 0
    border_size = 2
    col.active_border = $primary
    col.inactive_border = $inverse_on_surface
    resize_on_border = false
    allow_tearing = true
    layout = dwindle

    snap {
        enabled = false
        window_gap = 10
        monitor_gap = 10
        border_overlap = false
    }
}

decoration {
    rounding = 6
    rounding_power = 6.0
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    dim_inactive = true
    dim_strength = 0.2
    dim_special = 0.8

    shadow {
        enabled = false
        range = 35
        render_power = 2
        sharp = false
        scale = 1.0
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.0117
        contrast = 1.5000
        brightness = 2.0000
        vibrancy = 0.1696
        popups = false
    }
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

binds {
    allow_pin_fullscreen = true
}
